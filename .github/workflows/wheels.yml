name: Build wheels

# Builds portable wheels (no compiler/CMake needed by consumers) via
# cibuildwheel. Deliberately NOT run on every push — only on version tags or
# when triggered manually — since a full multi-platform build is slow.
# Extend the final job with a PyPI publish step (twine or trusted publishing)
# once you're ready to distribute beyond git dependencies.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
